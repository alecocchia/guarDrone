session_name: mpc_drone_simulation

# Imposta opzioni globali di tmux (come la barra dei titoli per i riquadri)
options:
  pane-border-status: top

windows:
  - window_name: dashboard_mpc
    layout: tiled
    panes:
      # Riquadro 0: Micro-XRCE-DDS Agent
      - shell_command:
          - "tmux select-pane -T '0: MicroAgent'"
          - MicroXRCEAgent udp4 -p 8888
          
      # Riquadro 1: PX4 SITL e Gazebo
      - shell_command:
          - "tmux select-pane -T '1: PX4 SITL'"
          - cd /root/PX4-Autopilot
          - make px4_sitl gz_x500
          
      # Riquadro 2: ROS 2 MPC Launch
      - shell_command:
          - "tmux select-pane -T '2: ROS 2 Launch'"
          - cd /root/my_ros2_ws
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch drone_mpc_pkg mpc_sim.launch.py
          
      # Riquadro 3: Terminale Manuale Vuoto
      - shell_command:
          - "tmux select-pane -T '3: Terminale Manuale'"
          - cd /root/my_ros2_ws
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - clear
