# 1. IL PEG (L'ostacolo fisico nell'ambiente)
- ros_topic_name: "/peg_pose"
  gz_topic_name: "/model/my_peg/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "ignition.msgs.Pose"
  direction: ROS_TO_GZ

# 2. CLOCK (Fondamentale per sincronizzare ROS 2 con il tempo della simulazione)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# 3. SENSORI ESTERNI (Camera - Non gestita dal flight controller)
- ros_topic_name: "/camera/image"
  gz_topic_name: "/camera"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA

- ros_topic_name: "/camera/camera_info"
  gz_topic_name: "/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
