# 1. IL PEG (L'ostacolo fisico nell'ambiente)
- ros_topic_name: "/peg_pose"
  gz_topic_name: "/model/my_peg_drone/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "gz.msgs.Pose"
  direction: ROS_TO_GZ

# 2. CLOCK (Fondamentale per sincronizzare ROS 2 con il tempo della simulazione)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

